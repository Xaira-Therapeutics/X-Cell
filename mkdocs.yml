site_name: X-Cell
site_description: A diffusion language model for genome-scale perturbation prediction across diverse cellular contexts
site_url: https://xaira-therapeutics.github.io/X-Cell
repo_url: https://github.com/Xaira-Therapeutics/X-Cell
repo_name: Xaira-Therapeutics/X-Cell
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - Model: model.md
  - Dataset: data.md
  - API Reference: api.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Xaira-Therapeutics/X-Cell
      name: X-Cell on GitHub

copyright: Copyright &copy; 2026 Xaira Therapeutics. Licensed under CC BY-NC-SA 4.0.
